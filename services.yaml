
---
# For configuration options and examples, please see:
# https://gethomepage.dev/configs/services/

- Infrastructure:
    - Proxmox:
        href: "http://proxmox.home:8006"
        description: Proxmox Server
        icon: "si-proxmox"
        widget:
          type: proxmox
          url: "https://proxmox.home:8006"
          username: "homepage@pam!homepage"
          password: "{{HOMEPAGE_VAR_PROXMOX}}"
          verify_ssl: false
          node: proxmox

    - Proxmox2:
        href: "http://proxmox2.home:8006"
        description: Proxmox Server
        icon: "si-proxmox"
        widget:
          type: proxmox
          url: "https://proxmox2.home:8006"
          username: "homepage@pam!homepage"
          password: "{{HOMEPAGE_VAR_PROXMOX}}"
          verify_ssl: false
          node: proxmox2
    
    - Proxmox Backup:
        href: "http://backup2.home:8007"
        description: Proxmox Backup Server
        icon: "si-proxmox"
        widget:
            type: proxmoxbackupserver
            url: "https://backup2.home:8007"
            username: "root@pam!homepage"
            password: "{{HOMEPAGE_VAR_PBS}}"
            verify_ssl: false

    - TrueNAS:
        href: "http://192.168.1.4"
        description: TrueNAS Storage
        icon: "si-truenas"
        widget:
          type: truenas
          url: "http://192.168.1.4"
          username: "truenas_admin"
          password: "{{HOMEPAGE_VAR_PASSWORD}}"
          enablePools: true

    - Arcane:
        href: "http://docker:3552"
        description: Docker Dashboard
        icon: "si-docker"
        widget:
          type: arcane
          url: "http://docker:3552"
          env: 0
          key: "{{HOMEPAGE_VAR_ARCANE}}"
          fields: ["running", "stopped", "image_updates", "images_unused"] 

    - Dockge:
        href: "http://docker:5001"
        description: Docker Management
        icon: "si-portainer"

- Network:
    - Unifi Controller:
        href: "https://unifi.ui.com/"
        description: Unifi Network Controller
        icon: "si-ubiquiti"
        widget:
          type: unifi
          url: "https://192.168.1.1"
          key: "{{HOMEPAGE_VAR_UNIFI}}"

    - Pi-hole:
        href: "http://192.168.1.100/admin"
        description: DNS and Ad Blocking
        icon: "si-pihole"
        widget:
          type: pihole
          url: "http://192.168.1.100"
          key: "{{HOMEPAGE_VAR_PIHOLE_PASSWORD}}"
          version: 6
    - Pi-hole 2:
        href: "http://192.168.1.101/admin"
        description: DNS and Ad Blocking
        icon: "si-pihole"
        widget:
          type: pihole
          url: "http://192.168.1.101"
          key: "{{HOMEPAGE_VAR_PASSWORD}}"
          version: 6
          
    - Speedtest:
        href: "http://speedtest"
        description: Speedtest CLI
        icon: "si-speedtest"
        widget:
          type: speedtest
          url: "http://speedtest"
          bitratePrecision: 2
          key: "{{HOMEPAGE_VAR_SPEEDTEST}}"

    - Travel Router:
        href: "http://192.168.8.1"
        description: Travel Router 
        icon: "si-openwrt"

    - Applications: 
        - Immich:
            href: "http://immich:2283"
            description: Photo Management
            icon: "si-immich"
            widget:
                type: immich
                url: "http://immich:2283"
                key: "{{HOMEPAGE_VAR_IMMICH}}"
                version: 2
                fields: ["photos", "videos", "storage"]

        - Paperless:
            href: "http://paperless:8000"
            description: Document Management
            icon: "si-paperlessngx"
            widget:
                type: paperlessngx
                url: "http://paperless:8000"
                username: "{{HOMEPAGE_VAR_NAME}}"
                password: "{{HOMEPAGE_VAR_PASSWORD}}"
                version: 2

        # - Homebox:
        #     href: "http://homebox:7745"
        #     description: Home Inventory Management
        #     icon: "si-homebridge"
        #     widget:
        #         type: homebox
        #         url: "http://homebox:7745"
        #         username: "{{HOMEPAGE_VAR_EMAIL}}"
        #         password: "{{HOMEPAGE_VAR_PASSWORD}}"

        - Concert Watcher:
            href: "http://spacebot:7474"
            description: Concert Watcher
            icon: "si-applemusic"
            
        - Home Assistant:
            href: "http://homeassistant:8123"
            description: Home Automation
            icon: "si-homeassistant"


- AI:
    - Ollama:
        href: "http://ollama-vm:11434"
        description: Local AI Model Hosting
        icon: "si-ollama"
    - Spacebot:
        href: "http://spacebot:19898"
        description: Spacebot
        icon: "si-starship"
        ping: spacebot.home
    - Bifrost:
        href: "http://ollama-vm:8080"
        description: Bifrost
        icon: "si-frontify"
    - OpenRouter:
        href: "https://openrouter.ai/activity"
        description: OpenRouter
        icon: "si-openrouter"
    - Arr:
        - Jellyfin:
            href: "http://jellyfin:8096"
            description: Media Server
            icon: "si-jellyfin"
            widget:
                type: jellyfin
                url: "http://jellyfin:8096"
                key: "{{HOMEPAGE_VAR_JELLYFIN}}"
            enableBlocks: true
        - Radarr:
            href: "http://radarr:7878"        
            description: Movie Management
            icon: "si-radarr"
            widget:
                type: radarr
                url: "http://radarr:7878"
                key: "{{HOMEPAGE_VAR_RADARR}}"
            enableQueue: true
        - Sonarr:
            href: "http://sonarr:8989"
            description: TV Show Management
            icon: "si-sonarr"
            widget:
                type: sonarr
                url: "http://sonarr:8989"
                key: "{{HOMEPAGE_VAR_SONARR}}"
                enableQueue: true
        - SABnzbd:
            href: "http://sabnzbd:7777"        
            description: Usenet Downloader
            icon: "si-abdownloadmanager"
            widget:
                type: sabnzbd
                url: "http://sabnzbd:7777"
                key: "{{HOMEPAGE_VAR_SABNZBD}}"
